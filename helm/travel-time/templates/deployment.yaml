apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "travel-time.fullname" . }}
  labels:
    {{- include "travel-time.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "travel-time.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "travel-time.labels" . | nindent 8 }}
      annotations:
        # Roll the pods when the batching/monitoring config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.monitoring.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.service.restPort | quote }}
        prometheus.io/path: /monitoring/prometheus/metrics
        {{- end }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The stock entrypoint hardcodes its flags, so invoke the server
          # directly to pass batching / threading options.
          command: ["/usr/bin/tensorflow_model_server"]
          args:
            - --port={{ .Values.service.grpcPort }}
            - --rest_api_port={{ .Values.service.restPort }}
            - --model_name={{ .Values.modelName }}
            - --model_base_path=/models/{{ .Values.modelName }}
            - --rest_api_num_threads={{ .Values.tensorflow.restApiNumThreads }}
            - --rest_api_timeout_in_ms={{ .Values.tensorflow.restApiTimeoutMs }}
            - --tensorflow_intra_op_parallelism={{ .Values.tensorflow.intraOpParallelism }}
            - --tensorflow_inter_op_parallelism={{ .Values.tensorflow.interOpParallelism }}
            {{- if .Values.batching.enabled }}
            - --enable_batching=true
            - --batching_parameters_file=/etc/tf-serving/batching.config
            {{- end }}
            {{- if .Values.monitoring.enabled }}
            - --monitoring_config_file=/etc/tf-serving/monitoring.config
            {{- end }}
          ports:
            - name: rest
              containerPort: {{ .Values.service.restPort }}
            - name: grpc
              containerPort: {{ .Values.service.grpcPort }}
          volumeMounts:
            - name: config
              mountPath: /etc/tf-serving
              readOnly: true
          startupProbe:
            httpGet:
              path: /v1/models/{{ .Values.modelName }}
              port: rest
            failureThreshold: 30
            periodSeconds: 2
          readinessProbe:
            httpGet:
              path: /v1/models/{{ .Values.modelName }}
              port: rest
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models/{{ .Values.modelName }}
              port: rest
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      {{- if or .Values.batching.enabled .Values.monitoring.enabled }}
      volumes:
        - name: config
          configMap:
            name: {{ include "travel-time.fullname" . }}-config
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
